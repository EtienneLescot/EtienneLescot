<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Etienne Lescot - AI systems architect</title>
  <desc id="desc">A dark technical banner with connected system nodes for agentic automation, grounded agents, realtime voice, and open-source infrastructure.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#070A0E"/>
      <stop offset="0.48" stop-color="#101820"/>
      <stop offset="1" stop-color="#070A0E"/>
    </linearGradient>
    <linearGradient id="accent" x1="250" y1="64" x2="1110" y2="296" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset="0.52" stop-color="#A3E635"/>
      <stop offset="1" stop-color="#FDE047"/>
    </linearGradient>
    <filter id="soft-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.4 0 0 0 0 0.9 0 0 0 0 0.75 0 0 0 0.32 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#25313B" stroke-width="1" opacity="0.38"/>
    </pattern>
  </defs>

  <rect width="1280" height="360" rx="28" fill="url(#bg)"/>
  <rect x="1" y="1" width="1278" height="358" rx="27" stroke="#24313A" stroke-width="2"/>
  <rect width="1280" height="360" rx="28" fill="url(#grid)" opacity="0.55"/>

  <path d="M756 102C820 46 910 48 976 92C1042 136 1120 136 1195 82" stroke="url(#accent)" stroke-width="2" opacity="0.52"/>
  <path d="M762 244C838 302 932 300 1000 252C1066 206 1138 202 1200 248" stroke="url(#accent)" stroke-width="2" opacity="0.36"/>
  <path d="M828 178H1158" stroke="#4B5563" stroke-width="1" stroke-dasharray="6 10" opacity="0.8"/>

  <g filter="url(#soft-glow)">
    <circle cx="838" cy="178" r="7" fill="#67E8F9"/>
    <circle cx="1004" cy="116" r="7" fill="#A3E635"/>
    <circle cx="1094" cy="232" r="7" fill="#FDE047"/>
    <circle cx="1190" cy="178" r="7" fill="#67E8F9"/>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="72" y="94" fill="#9CA3AF" font-size="18" letter-spacing="4">OPEN SOURCE / AGENTIC AI / REALTIME SYSTEMS</text>
    <text x="72" y="160" fill="#F9FAFB" font-size="58" font-weight="760">Etienne Lescot</text>
    <text x="74" y="208" fill="#D1D5DB" font-size="26" font-weight="440">AI systems architect building software for agents and humans.</text>
    <text x="74" y="260" fill="#94A3B8" font-size="18">code-first automation · grounded agents · low-latency voice · SaaS infrastructure</text>

    <g font-size="15" font-weight="620">
      <rect x="812" y="142" width="112" height="44" rx="10" fill="#0F172A" stroke="#334155"/>
      <text x="836" y="170" fill="#E5E7EB">n8n-as-code</text>
      <rect x="956" y="80" width="96" height="44" rx="10" fill="#0F172A" stroke="#334155"/>
      <text x="985" y="108" fill="#E5E7EB">YAGR</text>
      <rect x="1036" y="198" width="116" height="44" rx="10" fill="#0F172A" stroke="#334155"/>
      <text x="1060" y="226" fill="#E5E7EB">Voice AI</text>
      <rect x="1128" y="142" width="100" height="44" rx="10" fill="#0F172A" stroke="#334155"/>
      <text x="1154" y="170" fill="#E5E7EB">GitOps</text>
    </g>
  </g>
</svg>
